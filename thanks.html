<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Thanks for the feedback — Coach Jeff Job Finder</title>
<meta name="robots" content="noindex" />
<meta name="description" content="Thanks for sending feedback on the Coach Jeff Job Finder." />
<style>
  :root{
    --navy:#12203a;
    --navy-bar:#1c3257;
    --navy-deep:#0d1830;
    --paper:#fbfaf7;
    --card:#ffffff;
    --amber:#d98a2b;
    --amber-deep:#b6701c;
    --line:#e4e1d9;
    --mute:#5d6470;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--navy);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  .bar{
    background:var(--navy-bar);
    color:#fff;
    padding:14px 20px;
    font-weight:700;
    font-size:15px;
    letter-spacing:.2px;
  }
  .wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    max-width:520px;
    width:100%;
    padding:36px 32px;
    text-align:center;
    box-shadow:0 1px 3px rgba(18,32,58,.06);
  }
  .check{
    width:52px;height:52px;
    margin:0 auto 18px;
    border-radius:50%;
    background:#eaf4ec;
    border:1px solid #bfe0c6;
    display:flex;align-items:center;justify-content:center;
    color:#1f5c33;
    font-size:26px;
    line-height:1;
  }
  h1{
    font-size:23px;
    margin:0 0 10px;
    color:var(--navy);
  }
  p{
    font-size:15px;
    line-height:1.6;
    color:var(--mute);
    margin:0 0 24px;
  }
  .actions{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .btn{
    display:inline-block;
    text-decoration:none;
    font-weight:700;
    font-size:14px;
    padding:11px 22px;
    border-radius:9px;
    transition:background .15s ease;
  }
  .btn-primary{
    background:var(--amber);
    color:#1a1a1a;
  }
  .btn-primary:hover{background:var(--amber-deep);color:#fff}
  .btn-secondary{
    background:var(--navy-bar);
    color:#fff;
  }
  .btn-secondary:hover{background:var(--navy-deep)}
  @media (max-width:420px){
    .card{padding:28px 20px}
    .actions{flex-direction:column}
    .btn{width:100%}
  }
</style>
</head>
<body>
  <div class="bar">Coach Jeff — Job Finder</div>
  <div class="wrap">
    <div class="card">
      <div class="check">&#10003;</div>
      <h1>Thanks &mdash; got it.</h1>
      <p>I read every note that comes through, and feedback like yours is what shapes the next version of the Job Finder. If you left an email, I'll get back to you.</p>
      <div class="actions">
        <a class="btn btn-primary" href="/">&#8592; Back to the Job Finder</a>
        <a class="btn btn-secondary" href="/coaching.html">Free 1-on-1 coaching</a>
      </div>
    </div>
  </div>
</body>
</html>
